<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ shoe.name }} | Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Poppins', sans-serif; }
        .detail-card { border: none; border-radius: 20px; overflow: hidden; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .img-display { background: #f1f1f1; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .img-display img { max-width: 100%; height: auto; transition: 0.3s; }
        .price-large { font-size: 2.5rem; font-weight: 700; color: #ff4757; }
        .btn-back { border-radius: 50px; }
    </style>
</head>
<body>

    <div class="container my-5">
        <a href="/" class="btn btn-outline-dark mb-4 btn-back">
            <i class="fas fa-arrow-left me-2"></i> Back to Collection
        </a>

        <div class="row detail-card g-0">
            <div class="col-md-6 img-display">
                <img src="{{ shoe.image.url }}" alt="{{ shoe.name }}">
            </div>

            <div class="col-md-6 p-5 d-flex flex-column justify-content-center">
                <h6 class="text-muted text-uppercase tracking-widest">{{ shoe.brand }}</h6>
                <h1 class="display-4 fw-bold mb-3">{{ shoe.name }}</h1>
                <p class="text-secondary mb-4">{{ shoe.description }}</p>
                
                <div class="mb-4">
                    <span class="price-large">₹{{ shoe.price }}</span>
                </div>

                <div class="d-grid">
                    <a href="https://wa.me/91XXXXXXXXXX?text=I'm interested in buying {{ shoe.name }}" 
                       class="btn btn-success btn-lg py-3 rounded-pill fw-bold">
                        <i class="fab fa-whatsapp me-2"></i> Order via WhatsApp
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
